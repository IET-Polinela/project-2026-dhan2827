<!DOCTYPE html>
<html>
<head>
    <title>Daftar Laporan</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 70%;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
        }

        .nav {
            margin-top: 20px;
        }

        a {
            text-decoration: none;
            margin-right: 10px;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Daftar Laporan</h1>

    <div class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'add_report' %}">Tambah Laporan</a>
    </div>

    {% if reports %}
        {% for report in reports %}
            <div class="card">
                <h3>{{ report.title }}</h3>
                <p><b>Kategori:</b> {{ report.category }}</p>
                <p>{{ report.description }}</p>
                <p><b>Lokasi:</b> {{ report.location }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>Belum ada laporan 😢</p>
    {% endif %}

</div>

</body>
</html>
